<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PharmaHeaven Wholesale Medicine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="brand">
                    <i class="fas fa-hand-holding-medical"></i>
                    <span>PharmaHeaven</span>
                </div>
                <p class="auth-subtitle">Wholesale Medicine Solutions</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="admin@pharmaheaven.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    Login to Account <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p>New partner? <a href="#">Request Access</a></p>
                <p style="margin-top: 10px; font-size: 0.8rem; color: #95a5a6;">Demo: admin@pharmaheaven.com / admin123</p>
            </div>
        </div>
    </div>

    <!-- Auth JS -->
    <script src="js/auth.js"></script>
</body>
</html>
